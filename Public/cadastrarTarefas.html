<div class="row g-3 grid">
    <h1 class="h3 mb-3 fw-normal titulo-usuario">Cadastro de Usuários</h1>
    <div class="col-sm-12">
        <label for="descricao" class="form-label">Descrição</label>
        <input type="text" class="form-control" id="descricao" placeholder="" value="" required="">
    </div>
    <div class="col-sm-12">
        <label for="Setor" class="form-label">Setor</label>
        <input type="text" class="form-control" id="Setor" placeholder="" value="" required="">
    </div>
    <div class="col-12">
        <label for="Usuario" class="form-label">Usuario</label>
        <div class="input-group has-validation"> <span class="input-group-text">@</span>
            <input type="text" class="form-control" id="Usuario" placeholder="Usuario" required="">
        </div>
    </div>
    
    <div class="col-md-5">
        <label for="Prioridade" class="form-label">Prioridade</label>
        <select class="form-select" id="Prioridade" required="">
            <option value="0">Alta</option>
            <option value="1">Média</option>
            <option value="2">Baixa</option>
        </select>
    </div>
